<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Studio Drag Reorder</title>
    <style>
      :root {
        --bg: #fffdf8;
        --panel: #ffffff;
        --panel-border: #f3d9ae;
        --text: #16212f;
        --muted: #64748b;
        --accent: #d97706;
        --accent-soft: #fff7ed;
        --selected: #0f172a;
        --selected-soft: #fff7ed;
        --drop: #eff6ff;
        --drop-border: #93c5fd;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: "Avenir Next", "Hiragino Sans", "Yu Gothic", sans-serif;
        background: transparent;
        color: var(--text);
      }
      .board {
        border-radius: 24px;
        border: 1px solid var(--panel-border);
        background: linear-gradient(135deg, #fff8ee 0%, #f7fbff 100%);
        padding: 16px;
      }
      .header {
        display: flex;
        justify-content: space-between;
        align-items: end;
        gap: 12px;
        flex-wrap: wrap;
      }
      .eyebrow {
        font-size: 12px;
        letter-spacing: 0.08em;
        color: var(--accent);
        font-weight: 800;
        text-transform: uppercase;
      }
      .title {
        margin-top: 4px;
        font-size: 20px;
        font-weight: 800;
      }
      .sub {
        font-size: 12px;
        color: var(--muted);
      }
      .list {
        margin-top: 14px;
        display: grid;
        gap: 10px;
      }
      .slot {
        display: grid;
        grid-template-columns: 88px 1fr;
        gap: 10px;
        align-items: stretch;
      }
      .drop-slot {
        border-radius: 18px;
        border: 1px dashed var(--drop-border);
        background: var(--drop);
        padding: 12px 10px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 108px;
        transition: 160ms ease;
      }
      .drop-slot.active {
        background: #dbeafe;
        border-color: #2563eb;
        transform: scale(1.01);
      }
      .drop-label {
        font-size: 11px;
        font-weight: 800;
        color: #1d4ed8;
      }
      .drop-order {
        margin-top: 6px;
        font-size: 18px;
        font-weight: 900;
      }
      .card {
        border-radius: 18px;
        border: 1px solid #dbeafe;
        background: var(--panel);
        padding: 12px 14px;
        box-shadow: 0 10px 28px rgba(15, 23, 42, 0.06);
        cursor: grab;
        user-select: none;
      }
      .card.dragging {
        opacity: 0.56;
      }
      .card.selected {
        border: 2px solid var(--selected);
        background: var(--selected-soft);
      }
      .card.off {
        opacity: 0.45;
      }
      .card-top {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }
      .badge-row {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }
      .badge {
        padding: 4px 9px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 800;
      }
      .badge.seq {
        background: #eff6ff;
        color: #1d4ed8;
      }
      .badge.selected {
        background: var(--selected);
        color: white;
      }
      .badge.clip {
        background: #f1f5f9;
        color: #334155;
      }
      .label {
        margin-top: 10px;
        font-size: 14px;
        font-weight: 800;
      }
      .meta {
        margin-top: 6px;
        font-size: 12px;
        color: var(--muted);
      }
      .summary {
        margin-top: 8px;
        font-size: 12px;
        color: var(--muted);
      }
      .footer {
        margin-top: 12px;
        font-size: 12px;
        color: var(--muted);
      }
      @media (max-width: 740px) {
        .slot {
          grid-template-columns: 1fr;
        }
        .drop-slot {
          min-height: 72px;
        }
      }
    </style>
  </head>
  <body>
    <div class="board">
      <div class="header">
        <div>
          <div class="eyebrow">True Drag Reorder</div>
          <div class="title">クリップを掴んで並べ替え</div>
        </div>
        <div class="sub">カードをドラッグして、左の DROP スロットへ置くと順番が変わります</div>
      </div>
      <div id="list" class="list"></div>
      <div id="footer" class="footer"></div>
    </div>
    <script>
      const API_VERSION = 1;
      let currentRows = [];
      let currentOrder = [];
      let selectedRowId = "";
      let draggingId = "";

      function sendMessage(type, data) {
        window.parent.postMessage(
          Object.assign(
            {
              isStreamlitMessage: true,
              type,
            },
            data || {}
          ),
          "*"
        );
      }

      function setComponentReady() {
        sendMessage("streamlit:componentReady", { apiVersion: API_VERSION });
      }

      function setFrameHeight(height) {
        sendMessage("streamlit:setFrameHeight", { height: height });
      }

      function setComponentValue(value) {
        sendMessage("streamlit:setComponentValue", {
          value,
          dataType: "json",
        });
      }

      function formatSeconds(value) {
        const total = Math.max(0, Number(value) || 0);
        const minutes = Math.floor(total / 60);
        const seconds = total - minutes * 60;
        return minutes > 0 ? `${minutes}:${seconds.toFixed(2).padStart(5, "0")}` : `${seconds.toFixed(2)}s`;
      }

      function durationOf(row) {
        return Math.max(0, (Number(row.end_sec) || 0) - (Number(row.start_sec) || 0));
      }

      function summaryOf(row) {
        const parts = [];
        if (row.motion && row.motion !== "none") parts.push(row.motion);
        if (row.text_overlay) parts.push(`Text: ${String(row.text_overlay).slice(0, 24)}`);
        return parts.length ? parts.join(" / ") : "Trim only";
      }

      function orderedRows() {
        const byId = new Map(currentRows.map((row) => [String(row.id), row]));
        return currentOrder.map((id) => byId.get(String(id))).filter(Boolean);
      }

      function applyOrder(newOrder, emitValue) {
        currentOrder = [...newOrder];
        render();
        if (emitValue) {
          setComponentValue(currentOrder);
        }
      }

      function moveIdToIndex(rowId, targetIndex) {
        const next = currentOrder.filter((id) => String(id) !== String(rowId));
        const safeIndex = Math.max(0, Math.min(next.length, targetIndex));
        next.splice(safeIndex, 0, String(rowId));
        applyOrder(next, true);
      }

      function render() {
        const list = document.getElementById("list");
        const footer = document.getElementById("footer");
        const rows = orderedRows();
        list.innerHTML = "";
        rows.forEach((row, index) => {
          const slot = document.createElement("div");
          slot.className = "slot";

          const drop = document.createElement("div");
          drop.className = "drop-slot";
          drop.innerHTML = `<div class="drop-label">DROP</div><div class="drop-order">${String(index + 1).padStart(2, "0")}</div>`;
          drop.addEventListener("dragover", (event) => {
            event.preventDefault();
            drop.classList.add("active");
          });
          drop.addEventListener("dragleave", () => {
            drop.classList.remove("active");
          });
          drop.addEventListener("drop", (event) => {
            event.preventDefault();
            drop.classList.remove("active");
            if (!draggingId) return;
            moveIdToIndex(draggingId, index);
            draggingId = "";
          });

          const card = document.createElement("div");
          card.className = "card";
          card.draggable = true;
          if (String(row.id) === String(selectedRowId)) card.classList.add("selected");
          if (!row.use) card.classList.add("off");
          card.addEventListener("dragstart", () => {
            draggingId = String(row.id);
            card.classList.add("dragging");
          });
          card.addEventListener("dragend", () => {
            draggingId = "";
            card.classList.remove("dragging");
            document.querySelectorAll(".drop-slot.active").forEach((node) => node.classList.remove("active"));
          });
          card.innerHTML = `
            <div class="card-top">
              <div class="badge-row">
                <span class="badge seq">OUT ${String(index + 1).padStart(2, "0")}</span>
                <span class="badge ${String(row.id) === String(selectedRowId) ? "selected" : "clip"}">
                  ${String(row.id) === String(selectedRowId) ? "選択中" : "clip"}
                </span>
              </div>
              <div class="meta">${formatSeconds(row.start_sec)} → ${formatSeconds(row.end_sec)} / ${durationOf(row).toFixed(2)}s</div>
            </div>
            <div class="label">${String(row.label || row.id || "Clip")}</div>
            <div class="summary">${summaryOf(row)}</div>
          `;

          slot.appendChild(drop);
          slot.appendChild(card);
          list.appendChild(slot);
        });

        const tailDrop = document.createElement("div");
        tailDrop.className = "drop-slot";
        tailDrop.innerHTML = `<div class="drop-label">DROP</div><div class="drop-order">${String(rows.length).padStart(2, "0")}+</div>`;
        tailDrop.addEventListener("dragover", (event) => {
          event.preventDefault();
          tailDrop.classList.add("active");
        });
        tailDrop.addEventListener("dragleave", () => tailDrop.classList.remove("active"));
        tailDrop.addEventListener("drop", (event) => {
          event.preventDefault();
          tailDrop.classList.remove("active");
          if (!draggingId) return;
          moveIdToIndex(draggingId, rows.length - 1);
          draggingId = "";
        });
        list.appendChild(tailDrop);

        footer.textContent = `${rows.length} clips / 並び順はそのまま Motion Studio の出力順へ反映されます`;
        window.requestAnimationFrame(() => {
          const height = document.documentElement.scrollHeight || document.body.scrollHeight || 520;
          setFrameHeight(height);
        });
      }

      window.addEventListener("message", (event) => {
        const message = event.data || {};
        if (message.type !== "streamlit:render") return;
        const args = message.args || {};
        currentRows = Array.isArray(args.rows) ? args.rows : [];
        selectedRowId = String(args.selectedRowId || "");
        const defaultOrder = Array.isArray(args.default) ? args.default.map((value) => String(value)) : [];
        const incomingIds = currentRows.map((row) => String(row.id));
        const validDefault = defaultOrder.filter((id) => incomingIds.includes(id));
        const missing = incomingIds.filter((id) => !validDefault.includes(id));
        currentOrder = [...validDefault, ...missing];
        render();
      });

      window.addEventListener("load", () => {
        setComponentReady();
        render();
      });
    </script>
  </body>
</html>
