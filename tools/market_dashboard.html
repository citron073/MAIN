<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ouroboros Market Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Noto+Sans+JP:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Noto Sans JP',sans-serif;font-size:13px}
body{background:#0d1117;color:#e6edf3;overflow-x:hidden}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:2px}

/* Layout */
.app{display:flex;flex-direction:column;min-height:100vh}
.topbar{height:52px;background:#161b22;border-bottom:1px solid #21262d;display:flex;align-items:center;padding:0 20px;gap:16px;flex-shrink:0}
.main{flex:1;display:grid;grid-template-columns:1fr 260px;gap:0;min-height:0}
.center{padding:16px;display:flex;flex-direction:column;gap:14px;min-width:0}
.sidebar{background:#161b22;border-left:1px solid #21262d;padding:14px;display:flex;flex-direction:column;gap:14px;overflow-y:auto}
.bottom-bar{background:#161b22;border-top:1px solid #21262d;padding:8px 20px;display:flex;align-items:center;gap:16px;flex-shrink:0;font-size:11px;color:#8b949e;font-family:'IBM Plex Mono',monospace}

/* Cards */
.card{background:#161b22;border:1px solid #21262d;border-radius:6px;padding:14px}
.card-title{font-size:9px;font-weight:600;color:#3d444d;letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px}
.card.alert-on{border-color:#f85149;background:#1c1414}
.card.warn-on{border-color:#d29922;background:#1c1a12}
.card.ok-on{border-color:#3fb950;background:#121c14}

/* Status badge */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:10px;font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600}
.badge-ok{background:#3fb95022;color:#3fb950;border:1px solid #3fb95044}
.badge-warn{background:#d2992222;color:#d29922;border:1px solid #d2992244}
.badge-alert{background:#f8514922;color:#f85149;border:1px solid #f8514944}
.badge-off{background:#3d444d22;color:#8b949e;border:1px solid #3d444d44}

/* Metrics */
.metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px}
.metric{background:#1c2333;border-radius:5px;padding:10px}
.metric-label{font-size:9px;color:#8b949e;margin-bottom:4px;font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:.08em}
.metric-value{font-family:'IBM Plex Mono',monospace;font-size:18px;font-weight:600;color:#e6edf3;line-height:1}
.metric-sub{font-family:'IBM Plex Mono',monospace;font-size:10px;color:#8b949e;margin-top:3px}
.up{color:#3fb950}.down{color:#f85149}.neutral{color:#8b949e}

/* Trade tape */
.trade-row{display:grid;grid-template-columns:60px 36px 50px 1fr 70px;gap:6px;padding:5px 0;border-bottom:1px solid #21262d;font-family:'IBM Plex Mono',monospace;font-size:10px;align-items:center}
.trade-row:last-child{border-bottom:none}
.side-buy{color:#3fb950}.side-sell{color:#f85149}
.result-tp{color:#3fb950}.result-sl{color:#f85149}.result-to{color:#d29922}

/* Pill indicators */
.pill-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.pill{font-size:9px;font-family:'IBM Plex Mono',monospace;padding:2px 6px;border-radius:3px;background:#1c2333;color:#8b949e;border:1px solid #21262d}
.pill.on{background:#3fb95011;color:#3fb950;border-color:#3fb95033}
.pill.off{background:#f8514911;color:#f85149;border-color:#f8514933}
.pill.warn{background:#d2992211;color:#d29922;border-color:#d2992233}

/* Progress bar */
.progress-wrap{background:#1c2333;border-radius:3px;height:5px;margin-top:8px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .4s}

/* Weekly chart (bar) */
.weekly-bar{display:flex;align-items:flex-end;gap:2px;height:50px;padding-top:6px}
.wbar{flex:1;min-width:4px;border-radius:2px 2px 0 0;transition:height .3s}
.wbar.win{background:#3fb950cc}.wbar.loss{background:#f85149cc}.wbar.pending{background:#3d444d}

/* Alert input */
.alert-input{background:#1c2333;border:1px solid #30363d;border-radius:4px;color:#e6edf3;font-family:'IBM Plex Mono',monospace;font-size:12px;padding:5px 8px;width:100%;outline:none}
.alert-input:focus{border-color:#58a6ff}
.btn{background:#21262d;border:1px solid #30363d;color:#e6edf3;border-radius:4px;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:10px;padding:4px 10px;transition:all .15s}
.btn:hover{background:#30363d;border-color:#8b949e}
.btn-primary{background:#238636;border-color:#2ea043;color:#fff}
.btn-primary:hover{background:#2ea043}

/* Config panel */
.cfg-row{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.cfg-label{font-size:10px;color:#8b949e;width:48px;flex-shrink:0}
input.cfg-input{flex:1;background:#1c2333;border:1px solid #30363d;border-radius:3px;color:#e6edf3;font-family:'IBM Plex Mono',monospace;font-size:10px;padding:3px 6px;outline:none}
input.cfg-input:focus{border-color:#58a6ff}

/* Refresh indicator */
.dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:4px}
.dot-ok{background:#3fb950;animation:pulse 2s infinite}.dot-warn{background:#d29922}.dot-err{background:#f85149}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* Time */
.time-display{font-family:'IBM Plex Mono',monospace;font-size:12px;color:#8b949e;margin-left:auto}

/* Responsive */
@media(max-width:700px){
  .main{grid-template-columns:1fr}
  .sidebar{border-left:none;border-top:1px solid #21262d}
  .metric-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>
<div class="app">

<!-- TopBar -->
<div class="topbar">
  <div style="display:flex;align-items:center;gap:8px">
    <div style="width:22px;height:22px;border-radius:4px;background:#58a6ff;display:flex;align-items:center;justify-content:center">
      <span style="font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;color:#000">O</span>
    </div>
    <span style="font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;letter-spacing:.05em">OUROBOROS</span>
    <span style="font-size:10px;color:#8b949e">FX_BTC_JPY</span>
  </div>
  <div id="status-badge" class="badge badge-off">— 読込中</div>
  <div id="headline" style="font-size:11px;color:#8b949e;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1"></div>
  <div class="time-display" id="clock">--:--:--</div>
  <button class="btn" onclick="loadData()" title="今すぐ更新">↻</button>
  <button class="btn" onclick="toggleConfig()" title="接続設定">⚙</button>
</div>

<!-- Config panel (hidden by default) -->
<div id="cfg-panel" style="background:#161b22;border-bottom:1px solid #21262d;padding:10px 20px;display:none">
  <div style="font-size:10px;color:#8b949e;margin-bottom:8px;font-family:'IBM Plex Mono',monospace;letter-spacing:.1em">SERVER CONFIG</div>
  <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end">
    <div class="cfg-row" style="width:280px">
      <span class="cfg-label">URL</span>
      <input class="cfg-input" id="cfg-url" placeholder="http://161.33.26.35:8787">
    </div>
    <div class="cfg-row" style="width:280px">
      <span class="cfg-label">Token</span>
      <input class="cfg-input" id="cfg-token" type="password" placeholder="bearer token">
    </div>
    <button class="btn btn-primary" onclick="saveConfig()">保存して接続</button>
  </div>
</div>

<!-- Main content -->
<div class="main">
<div class="center">

  <!-- Metrics row -->
  <div class="card" id="card-main">
    <div class="card-title">ボット状態</div>
    <div class="metric-grid" id="metrics-grid">
      <div class="metric"><div class="metric-label">証拠金</div><div class="metric-value" id="m-balance">--</div><div class="metric-sub" id="m-balance-sub">JPY</div></div>
      <div class="metric"><div class="metric-label">日次 P&L</div><div class="metric-value" id="m-daily-pnl">--</div><div class="metric-sub" id="m-daily-sub">今日 0件</div></div>
      <div class="metric"><div class="metric-label">週次 P&L</div><div class="metric-value" id="m-weekly-pnl">--</div><div class="metric-sub" id="m-weekly-sub">-- / --</div></div>
      <div class="metric"><div class="metric-label">週次 WR</div><div class="metric-value" id="m-wr">--%</div><div class="metric-sub" id="m-wr-sub">-- trades</div></div>
      <div class="metric"><div class="metric-label">目標達成</div><div class="metric-value" id="m-goal">--%</div><div class="metric-sub" id="m-goal-sub">目標 ¥-- / 日</div></div>
    </div>
    <div class="pill-row" id="pill-row"></div>
    <div class="progress-wrap"><div class="progress-fill" id="goal-bar" style="width:0%;background:#58a6ff"></div></div>
  </div>

  <!-- Latest trade -->
  <div class="card">
    <div class="card-title">最終取引 / 直近履歴</div>
    <div id="latest-trade-info" style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:#8b949e;margin-bottom:10px">--</div>
    <div id="trade-tape"></div>
  </div>

  <!-- Weekly mini chart -->
  <div class="card">
    <div class="card-title">週次サマリー</div>
    <div id="weekly-detail" style="font-size:11px;color:#8b949e;font-family:'IBM Plex Mono',monospace;line-height:1.8"></div>
    <div class="weekly-bar" id="weekly-bar"></div>
  </div>

</div><!-- /center -->

<!-- Sidebar -->
<div class="sidebar">

  <!-- Freshness -->
  <div>
    <div class="card-title">データ鮮度</div>
    <div id="freshness-row" style="font-size:11px;font-family:'IBM Plex Mono',monospace;color:#8b949e"></div>
  </div>

  <!-- Price alert -->
  <div>
    <div class="card-title">価格アラート (BTC/JPY)</div>
    <div style="margin-bottom:6px">
      <input class="alert-input" id="alert-price-input" type="number" placeholder="例: 12500000" step="1000">
    </div>
    <div style="display:flex;gap:5px;margin-bottom:8px">
      <button class="btn" onclick="addPriceAlert('above')" style="flex:1">↑ 以上</button>
      <button class="btn" onclick="addPriceAlert('below')" style="flex:1">↓ 以下</button>
    </div>
    <div id="alert-list" style="display:flex;flex-direction:column;gap:4px"></div>
  </div>

  <!-- KEIBA status (local) -->
  <div>
    <div class="card-title">KEIBA ステータス</div>
    <div id="keiba-status" style="font-size:10px;font-family:'IBM Plex Mono',monospace;color:#8b949e;line-height:1.8">
      ローカルのみ確認可<br>
      <span style="font-size:9px">/keiba スキルで確認</span>
    </div>
  </div>

  <!-- Version info -->
  <div>
    <div class="card-title">バージョン</div>
    <div id="version-info" style="font-size:10px;font-family:'IBM Plex Mono',monospace;color:#8b949e;line-height:1.8"></div>
  </div>

  <!-- Refresh status -->
  <div style="margin-top:auto">
    <div style="font-size:9px;font-family:'IBM Plex Mono',monospace;color:#3d444d">
      <span class="dot" id="refresh-dot" style="background:#3d444d"></span>
      <span id="refresh-status">未接続</span>
    </div>
    <div style="font-size:9px;color:#3d444d;margin-top:3px">30秒ごとに自動更新</div>
  </div>

</div><!-- /sidebar -->
</div><!-- /main -->

<!-- Bottom bar -->
<div class="bottom-bar">
  <span id="summary-text" style="color:#8b949e;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
  <span id="generated-at" style="color:#3d444d;flex-shrink:0"></span>
</div>

</div><!-- /app -->

<script>
// ---- Config ----
const DEFAULT_URL  = 'http://161.33.26.35:8787';
const DEFAULT_TOKEN = '';
let CFG = {url: DEFAULT_URL, token: DEFAULT_TOKEN};

function loadConfig() {
  try {
    const s = JSON.parse(localStorage.getItem('ouroboros_dash') || '{}');
    if (s.url)   CFG.url   = s.url;
    if (s.token) CFG.token = s.token;
  } catch(e) {}
  document.getElementById('cfg-url').value   = CFG.url;
  document.getElementById('cfg-token').value = CFG.token;
}
function saveConfig() {
  CFG.url   = document.getElementById('cfg-url').value.trim()   || DEFAULT_URL;
  CFG.token = document.getElementById('cfg-token').value.trim() || DEFAULT_TOKEN;
  localStorage.setItem('ouroboros_dash', JSON.stringify(CFG));
  toggleConfig();
  loadData();
}
function toggleConfig() {
  const p = document.getElementById('cfg-panel');
  p.style.display = p.style.display === 'none' ? 'block' : 'none';
}

// ---- Price Alerts ----
let priceAlerts = [];
let lastBtcPrice = null;

function loadAlerts() {
  try { priceAlerts = JSON.parse(localStorage.getItem('ouroboros_alerts') || '[]'); } catch(e) {}
  renderAlerts();
}
function addPriceAlert(dir) {
  const v = parseFloat(document.getElementById('alert-price-input').value);
  if (!v || v <= 0) return;
  priceAlerts.push({id: Date.now(), dir, price: v, fired: false});
  localStorage.setItem('ouroboros_alerts', JSON.stringify(priceAlerts));
  document.getElementById('alert-price-input').value = '';
  renderAlerts();
}
function removeAlert(id) {
  priceAlerts = priceAlerts.filter(a => a.id !== id);
  localStorage.setItem('ouroboros_alerts', JSON.stringify(priceAlerts));
  renderAlerts();
}
function checkAlerts(btcPrice) {
  if (!btcPrice) return;
  priceAlerts.forEach(a => {
    if (a.fired) return;
    const triggered = a.dir === 'above' ? btcPrice >= a.price : btcPrice <= a.price;
    if (triggered) {
      a.fired = true;
      if (Notification.permission === 'granted') {
        new Notification('Ouroboros 価格アラート', {
          body: `BTC/JPY ${a.dir === 'above' ? '↑' : '↓'} ¥${a.price.toLocaleString('ja-JP')} を突破 (現在: ¥${btcPrice.toLocaleString('ja-JP')})`,
          icon: ''
        });
      }
      localStorage.setItem('ouroboros_alerts', JSON.stringify(priceAlerts));
      renderAlerts();
    }
  });
}
function renderAlerts() {
  const el = document.getElementById('alert-list');
  if (!priceAlerts.length) { el.innerHTML = '<div style="font-size:9px;color:#3d444d;font-family:IBM Plex Mono,monospace">アラート未設定</div>'; return; }
  el.innerHTML = priceAlerts.map(a =>
    `<div style="display:flex;justify-content:space-between;align-items:center;background:${a.fired?'#3fb95011':'#1c2333'};border:1px solid ${a.fired?'#3fb95033':'#30363d'};border-radius:3px;padding:4px 6px">
      <span style="font-family:IBM Plex Mono,monospace;font-size:10px;color:${a.fired?'#3fb950':'#e6edf3'}">${a.dir==='above'?'↑':'↓'} ¥${a.price.toLocaleString('ja-JP')}${a.fired?' ✓':''}</span>
      <button onclick="removeAlert(${a.id})" style="background:none;border:none;color:#3d444d;cursor:pointer;font-size:11px;padding:0 2px">×</button>
    </div>`
  ).join('');
}

// ---- Data loading ----
async function loadData() {
  const dot = document.getElementById('refresh-dot');
  const status = document.getElementById('refresh-status');
  dot.className = 'dot dot-warn';
  status.textContent = '取得中...';

  const url = `${CFG.url}/widget-status.json${CFG.token ? '?token=' + encodeURIComponent(CFG.token) : ''}`;
  try {
    const resp = await fetch(url, {signal: AbortSignal.timeout(8000)});
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const d = await resp.json();
    renderData(d);
    dot.className = 'dot dot-ok';
    status.textContent = `OK · ${new Date().toLocaleTimeString('ja-JP')}`;
  } catch(e) {
    dot.className = 'dot dot-err';
    status.textContent = `エラー: ${e.message}`;
    document.getElementById('status-badge').className = 'badge badge-off';
    document.getElementById('status-badge').textContent = '接続エラー';
  }
}

// ---- Render ----
function fmtJpy(v) {
  if (v == null) return '--';
  const n = parseFloat(v);
  if (isNaN(n)) return '--';
  return (n >= 0 ? '+' : '') + '¥' + Math.abs(n).toLocaleString('ja-JP', {maximumFractionDigits:0});
}
function fmtNum(v, dec=0) {
  if (v == null) return '--';
  return parseFloat(v).toLocaleString('ja-JP', {minimumFractionDigits:dec, maximumFractionDigits:dec});
}

function renderData(d) {
  // Status badge
  const badge = document.getElementById('status-badge');
  const lvl = (d.status_level || '').toUpperCase();
  badge.className = lvl === 'ALERT' ? 'badge badge-alert' : lvl === 'WARN' ? 'badge badge-warn' : lvl === 'OK' ? 'badge badge-ok' : 'badge badge-off';
  badge.textContent = d.headline || lvl || '--';

  document.getElementById('headline').textContent = d.summary_text || '';
  document.getElementById('generated-at').textContent = `更新: ${d.generated_at || '--'}`;
  document.getElementById('summary-text').textContent = d.summary_text || '';

  // Card color
  const card = document.getElementById('card-main');
  card.className = 'card' + (lvl === 'ALERT' ? ' alert-on' : lvl === 'WARN' ? ' warn-on' : lvl === 'OK' ? ' ok-on' : '');

  // Balance
  const bal = d.balance || {};
  const balEl = document.getElementById('m-balance');
  const balV = parseFloat(bal.jpy || 0);
  balEl.textContent = '¥' + balV.toLocaleString('ja-JP', {maximumFractionDigits:0});
  document.getElementById('m-balance-sub').textContent = bal.label || 'JPY';

  // Daily P&L from goal
  const goal = d.goal || {};
  const goalPnl = parseFloat(goal.pnl_jpy || 0);
  const dailyEl = document.getElementById('m-daily-pnl');
  dailyEl.textContent = fmtJpy(goalPnl);
  dailyEl.className = 'metric-value ' + (goalPnl >= 0 ? 'up' : 'down');
  document.getElementById('m-daily-sub').textContent = `今日 ${goal.closed_n || 0}件`;

  // Goal progress
  const goalJpy = parseFloat(goal.goal_jpy || 100);
  const goalPct = Math.max(0, Math.min(100, (goalPnl / goalJpy) * 100));
  document.getElementById('m-goal').textContent = goalPct.toFixed(0) + '%';
  document.getElementById('m-goal-sub').textContent = `目標 ¥${fmtNum(goalJpy)} / 日`;
  const bar = document.getElementById('goal-bar');
  bar.style.width = Math.abs(goalPct) + '%';
  bar.style.background = goalPnl >= 0 ? '#3fb950' : '#f85149';

  // Weekly
  const wk = d.weekly || {};
  const wkPnl = parseFloat(wk.pnl_jpy_sum || 0);
  const wkEl = document.getElementById('m-weekly-pnl');
  wkEl.textContent = fmtJpy(wkPnl);
  wkEl.className = 'metric-value ' + (wkPnl >= 0 ? 'up' : 'down');
  document.getElementById('m-weekly-sub').textContent = `${wk.start_day8 || '--'}〜${wk.end_day8 || '--'}`;
  const wr = parseFloat(wk.win_rate_pct || 0);
  const wrEl = document.getElementById('m-wr');
  wrEl.textContent = wr.toFixed(1) + '%';
  wrEl.className = 'metric-value ' + (wr >= 50 ? 'up' : wr >= 40 ? 'neutral' : 'down');
  document.getElementById('m-wr-sub').textContent = `${wk.closed_n || 0} trades (W${wk.win_n || 0}/L${wk.loss_n || 0})`;

  // Pills
  const runner = d.freshness && d.freshness.status === 'OK';
  const pills = [
    {label: 'runner', on: runner},
    {label: 'trade', on: (d.summary_text || '').includes('trade=ON')},
    {label: 'risk', on: !(d.summary_text || '').includes('risk=OFF'), warn: (d.summary_text || '').includes('risk=ON')},
    {label: 'drift', on: (d.summary_text || '').includes('drift=OK'), warn: (d.summary_text || '').includes('drift=INSUFFICIENT')},
  ];
  document.getElementById('pill-row').innerHTML = pills.map(p =>
    `<span class="pill ${p.warn ? 'warn' : p.on ? 'on' : 'off'}">${p.label}=${p.on || p.warn ? 'ON' : 'OFF'}</span>`
  ).join('');

  // Latest trade
  const lt = d.latest_trade || {};
  if (lt.available) {
    const retPct = parseFloat(lt.ret_pct || 0);
    const retCls = retPct >= 0 ? 'up' : 'down';
    document.getElementById('latest-trade-info').innerHTML =
      `<span class="side-${(lt.side||'').toLowerCase()}">${lt.side||'--'}</span> ` +
      `<span>${lt.result||lt.reason||'--'}</span> ` +
      `<span class="${retCls}">${retPct.toFixed(3)}%</span> ` +
      `<span style="color:#8b949e">(${lt.pnl_jpy >= 0 ? '+' : ''}¥${parseFloat(lt.pnl_jpy||0).toFixed(0)}) ` +
      `${lt.age_text||'--'}</span>`;

    // Try to get entry price for BTC display
    if (lt.entry_price) {
      lastBtcPrice = lt.entry_price;
      checkAlerts(lastBtcPrice);
    }
  } else {
    document.getElementById('latest-trade-info').textContent = '取引データなし';
  }

  // Trade tape (from weekly trades if available)
  const tape = document.getElementById('trade-tape');
  if (d.trades && d.trades.length) {
    tape.innerHTML = d.trades.slice(0, 8).map(t => {
      const rCls = t.result === 'TP' || t.result === 'WIN' ? 'result-tp' : t.result === 'SL' || t.result === 'LOSS' ? 'result-sl' : 'result-to';
      return `<div class="trade-row">
        <span style="color:#8b949e">${(t.time||'').slice(5,16)}</span>
        <span class="side-${(t.side||'').toLowerCase()}">${t.side||'--'}</span>
        <span class="${rCls}">${t.result||'--'}</span>
        <span style="color:#8b949e">${t.reason||''}</span>
        <span class="${parseFloat(t.ret_pct||0) >= 0 ? 'up' : 'down'}">${parseFloat(t.ret_pct||0).toFixed(3)}%</span>
      </div>`;
    }).join('');
  } else {
    tape.innerHTML = `<div style="font-size:10px;color:#3d444d;font-family:IBM Plex Mono,monospace;padding:4px 0">履歴データは成績タブで確認</div>`;
  }

  // Weekly detail
  document.getElementById('weekly-detail').innerHTML =
    `損益: <span class="${wkPnl>=0?'up':'down'}">${fmtJpy(wkPnl)}</span>  ` +
    `勝率: <span class="${wr>=50?'up':wr>=40?'neutral':'down'}">${wr.toFixed(1)}%</span><br>` +
    `日数: ${wk.days_count||0}日  取引: ${wk.closed_n||0}件<br>` +
    (wk.shadow_decision ? `Shadow: ${wk.shadow_decision}` : '') +
    (wk.pattern_hint ? `<br>パターン: ${wk.pattern_hint}` : '');

  // Weekly bar (dummy positions based on available data)
  const wkDays = parseInt(wk.days_count || 0);
  const wins = parseInt(wk.win_n || 0);
  const losses = parseInt(wk.loss_n || 0);
  const barEl = document.getElementById('weekly-bar');
  barEl.innerHTML = '';
  for (let i = 0; i < 5; i++) {
    const div = document.createElement('div');
    div.className = 'wbar' + (i < wins ? ' win' : i < wins + losses ? ' loss' : ' pending');
    div.style.height = (i < wins + losses ? (40 + Math.random() * 30) : 15) + 'px';
    barEl.appendChild(div);
  }

  // Freshness
  const fr = d.freshness || {};
  document.getElementById('freshness-row').innerHTML =
    `状態: <span class="${fr.status==='OK'?'up':'down'}">${fr.status||'--'}</span><br>` +
    `基準: ${fr.reference||'--'}<br>` +
    `更新: ${fr.age_text||'--'}`;

  // Version
  const ver = d.versions || {};
  document.getElementById('version-info').innerHTML =
    `bot: ${ver.bot_logic||'--'}<br>dash: ${ver.dashboard||'--'}<br>widget: ${ver.widget_server||'--'}`;
}

// ---- Clock ----
function tickClock() {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('ja-JP', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
setInterval(tickClock, 1000);
tickClock();

// ---- Notification permission ----
if (Notification && Notification.permission === 'default') {
  Notification.requestPermission();
}

// ---- Auto-refresh ----
setInterval(loadData, 30000);

// ---- Init ----
loadConfig();
loadAlerts();
loadData();
</script>
</body>
</html>
